name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Create .env file
        run: |
          echo "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}" >> .env
          echo "OPENAI_MODEL=gpt-4.1-mini" >> .env
          echo "OPENAI_EMBED_MODEL=text-embedding-3-small" >> .env
          echo "APP_ENV=dev" >> .env
          echo "FLASK_HOST=0.0.0.0" >> .env
          echo "FLASK_PORT=8000" >> .env
          echo "RAG_TOP_K=5" >> .env
          echo "MEMORY_MAX_TURNS=10" >> .env

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run evaluation pipeline
        run: |
          python -m scripts.03_run_eval

      - name: Build Docker image
        run: |
          docker build -f docker/Dockerfile.backend -t personal-chatbot-backend .